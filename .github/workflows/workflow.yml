name: Train and Evaluate Diabetes Model

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Number of training epochs"
        required: true
        default: "30"
        type: string

jobs:
  train:
    name: Train Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas \
            scikit-learn \
            joblib \
            mlflow==2.12.1 \
            numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
            
      - name: Verify training data
        run: |
          ls -lh data/diabetes.csv

      - name: Train model
        run: |
          python train.py --epochs ${{ github.event.inputs.epochs }}
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
          MLFLOW_REGISTRY_URI: sqlite:///mlflow_registry.db

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            artifacts/
            mlruns/
            mlflow_registry.db
          retention-days: 7

  evaluate:
    name: Evaluate Model
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas \
            scikit-learn \
            joblib \
            mlflow==2.12.1 \
            numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Download artifacts from train job
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts

      - name: Copy test data for predict.py
        run: |
          cp artifacts/X_test.csv X_test.csv
          cp artifacts/y_test.csv y_test.csv

      - name: Evaluate model
        run: |
          python predict.py
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
          MLFLOW_REGISTRY_URI: sqlite:///mlflow_registry.db

      - name: Upload predictions
        uses: actions/upload-artifact@v4
        with:
          name: predictions
          path: predictions.csv
          retention-days: 7

      - name: Print metrics summary
        run: |
          echo "=== Metrics from training ==="
          cat artifacts/metrics.csv
          echo ""
          echo "=== Predictions sample ==="
          head -5 predictions.csv
